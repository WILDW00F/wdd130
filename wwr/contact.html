<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting Co. Get our address, phone, email, and send us a message through our contact form.">
    <meta name="author" content="Thomas Dettmar">
    <title>Contact Us - White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="header-container">
            <img src="images/z-therapidssplash.jpg" alt="Rafting Company Logo">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html" class="active">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <h1>White Water Rafting Company</h1>

        <section class="company-info">
            <h2>Contact Information</h2>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-layout">

            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3067.123456789!2d-105.2705!3d40.0150!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x876c78123456789%3A0x123456789abcdef!2sWhitewater%20Rafting%20Adventures!5e0!3m2!1sen!2sus!4v1699999999999!5m2!1sen!2sus"
                  loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <div class="contact-form">
                <h2>Send Us a Message</h2>

                <form action="submit_form.php" method="POST">

                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <fieldset>
                        <legend>Purpose of Message:</legend>

                        <label for="general">
                            <input type="radio" id="general" name="purpose" value="general"
                              required>
                            General Inquiry
                        </label>

                        <label for="reservation">
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            Reservation Question
                        </label>

                        <label for="website">
                            <input type="radio" id="website" name="purpose" value="website">
                            Website Suggestion
                        </label>
                    </fieldset>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <div class="checkbox-row">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">Please subscribe me to the monthly
                            newsletter</label>
                    </div>

                    <button type="submit">Get in Touch!</button>

                </form>
            </div>

        </section>

        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <div class="team-grid">
                <figure>
                    <img src="images/john_smith.jpg" alt="John Smith rafting guide">
                    <figcaption>John Smith – Lead Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/jane_doe.jpg" alt="Jane Doe customer service manager">
                    <figcaption>Jane Doe – Customer Service Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/mike_jones.jpg" alt="Mike Jones safety officer">
                    <figcaption>Mike Jones – Safety Officer</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting Co. | Thomas Dettmar</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Visit our Facebook page">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="Visit our LinkedIn profile">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Visit our Instagram page">
            </a>
        </nav>
    </footer>

</body>

</html>
